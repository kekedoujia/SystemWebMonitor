<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>System Web Monitor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>System Web Monitor</h1>
        <p id="subtitle">实时 GPU + CPU 监控 · nvidia-smi + Intel RAPL</p>
      </div>
      <div class="status">
        <span id="statusDot" class="dot"></span>
        <span id="statusText">连接中</span>
      </div>
    </header>

    <main>
      <section class="panel energy-panel">
        <div class="panel-head">
          <h2>能耗</h2>
          <span id="energyStatus" class="muted">采样中…</span>
        </div>
        <div class="energy-body">
          <div class="energy-stats">
            <div class="energy-stat">
              <div class="label">启动时间</div>
              <div class="value" id="energyStart">—</div>
              <div class="subvalue" id="energyUptime">—</div>
            </div>
            <div class="energy-stat">
              <div class="label">累计耗电 (CPU + GPU)</div>
              <div class="value" id="energyTotal">— kWh</div>
              <div class="subvalue" id="energyNow">— W</div>
              <div class="subvalue" id="energyBreakdown">CPU — W · GPU — W</div>
            </div>
          </div>
          <div class="energy-chart-wrap">
            <div class="energy-chart-head">
              <span>按小时耗电 (kWh)</span>
              <span class="muted" id="energyChartRange">—</span>
            </div>
            <svg id="energyChart" class="energy-chart" preserveAspectRatio="none"></svg>
          </div>
        </div>
      </section>

      <section id="cpuGrid" class="gpu-grid cpu-grid"></section>

      <section id="gpuGrid" class="gpu-grid"></section>

      <section class="panel">
        <div class="panel-head">
          <h2>进程</h2>
          <span id="processCount" class="muted">0 个</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>GPU</th>
                <th>PID</th>
                <th>进程名</th>
                <th>显存</th>
              </tr>
            </thead>
            <tbody id="processRows">
              <tr><td colspan="4" class="empty">暂无计算进程</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
