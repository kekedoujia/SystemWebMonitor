<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>System Web Monitor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1 data-i18n="title">System Web Monitor</h1>
        <p id="subtitle" data-i18n="subtitle">实时 GPU + CPU 监控 · nvidia-smi + Intel RAPL</p>
      </div>
      <div class="topbar-right">
        <button id="langToggle" class="lang-toggle" type="button" aria-label="Toggle language">EN</button>
        <div class="status">
          <span id="statusDot" class="dot"></span>
          <span id="statusText" data-i18n="status_connecting">连接中</span>
        </div>
      </div>
    </header>

    <main>
      <section class="panel energy-panel">
        <div class="panel-head">
          <h2 data-i18n="energy_panel">能耗</h2>
          <span id="energyStatus" class="muted" data-i18n="energy_sampling">采样中…</span>
        </div>
        <div class="energy-body">
          <div class="energy-stats">
            <div class="energy-stat">
              <div class="label" data-i18n="energy_start">启动时间</div>
              <div class="value" id="energyStart">—</div>
              <div class="subvalue" id="energyUptime">—</div>
            </div>
            <div class="energy-stat">
              <div class="label" data-i18n="energy_total">累计耗电 (CPU + GPU)</div>
              <div class="value" id="energyTotal">— kWh</div>
              <div class="subvalue" id="energyNow">— W</div>
              <div class="subvalue" id="energyBreakdown">CPU — W · GPU — W</div>
            </div>
          </div>
          <div class="energy-chart-wrap">
            <div class="energy-chart-head">
              <span data-i18n="energy_chart_title">按小时耗电 (kWh, 最近 24h)</span>
              <span class="muted" id="energyChartRange">—</span>
            </div>
            <svg id="energyChart" class="energy-chart" preserveAspectRatio="none"></svg>
          </div>
        </div>
      </section>

      <section id="cpuGrid" class="gpu-grid cpu-grid"></section>

      <section id="gpuGrid" class="gpu-grid"></section>

      <section class="panel">
        <div class="panel-head">
          <h2 data-i18n="proc_panel">进程</h2>
          <span id="processCount" class="muted">0</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-i18n="proc_col_gpu">GPU</th>
                <th data-i18n="proc_col_pid">PID</th>
                <th data-i18n="proc_col_name">进程名</th>
                <th data-i18n="proc_col_mem">显存</th>
              </tr>
            </thead>
            <tbody id="processRows">
              <tr><td colspan="4" class="empty" data-i18n="proc_empty">暂无计算进程</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
